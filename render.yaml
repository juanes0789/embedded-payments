services:
  - type: web
    name: embedded-payments
    env: java
    plan: free
    buildCommand: export JAVA_HOME="$(dirname \"$(dirname \"$(readlink -f \"$(command -v javac)\")\")\")" && ./mvnw clean package -DskipTests
    startCommand: java -jar target/embedded-payments-0.0.1-SNAPSHOT.jar
    autoDeploy: true
    envVars:
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: none
      - key: APP_SECURITY_JWT_ISSUER
        value: embedded-payments


