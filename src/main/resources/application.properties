spring.application.name=embedded-payments
server.port=${PORT:8085}

# Carga variables locales desde .env cuando exista
spring.config.import=optional:file:.env[.properties]

spring.datasource.url=${SPRING_DATASOURCE_URL:}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
spring.jpa.open-in-view=false



app.security.jwt.issuer=${APP_SECURITY_JWT_ISSUER:embedded-payments}
app.security.jwt.secret=${JWT_SECRET:change-this-secret-key-change-this-secret-key}
app.security.jwt.expiration-minutes=60

# Encryption service configuration for sensitive data (bank account, routing numbers)
encryption.secret-key=${ENCRYPTION_SECRET_KEY:SlCLenTTC9xn/YCU+7P/oikmLjZap8IAtgvxKyRBZOQ=}

# Payment Processor Configuration
# Valid values: mock (default for development), stripe, adyen
payment.processor=${PAYMENT_PROCESSOR:mock}

